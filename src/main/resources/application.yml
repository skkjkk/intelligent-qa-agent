spring:
  application:
    name: intelligent-qa-agent
  profiles:
    active: dev

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    
# 天气API公共配置
amap:
  weather:
    key: ${AMAP_WEATHER_KEY:}
    url: https://restapi.amap.com/v3/weather/weatherInfo

knowledge-base:
  # 嵌入式向量
  embedding:
    api-url: https://open.bigmodel.cn/api/paas/v4/embeddings
    api-key: ${KB_EMBEDDING_API_KEY:}
    model: embedding-3
    dimension: 2048
    
  # Elasticsearch
  elasticsearch:
    index-name: kb_chunks_v2
    top-k: 5
    enable-hybrid: true
    
  # MinIO
  minio:
    endpoint: ${KB_MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${KB_MINIO_ACCESS_KEY:}
    secret-key: ${KB_MINIO_SECRET_KEY:}
    bucket-name: intelligent-qa-kb
    
  # Kafka
  kafka:
    topic-document-process: kb-document-process
    consumer-concurrency: 1
  chunking:
    default-size: 500
    default-overlap: 50
    max-size: 1000
    
    
  # RAG配置
  rag:
    max-context-chunks: 5
    enable-rerank: false
    prompt-template:
      你是一个知识库问答助手。请严格基于参考资料回答问题。
      如果参考资料不足，请明确说“知识库中没有足够信息支持回答该问题”。

      【参考资料】
      {{context}}

      【问题】
      {{question}}

      【回答要求】
      1. 仅基于参考资料回答
      2. 使用中文
      3. 不要编造内容
      4. 如果引用资料，可标注[1][2]
      
  # 安全配置
  security:
    enable-acl: true
    query-rate-limit: 30