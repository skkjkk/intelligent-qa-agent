spring:
  application:
    name: intelligent-qa-agent
  profiles:
    active: dev

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    
# 天气API公共配置
amap:
  weather:
    key: ${AMAP_WEATHER_KEY:}
    url: https://restapi.amap.com/v3/weather/weatherInfo