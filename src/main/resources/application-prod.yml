spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:3306/intelligent_qa_agent?useUnicode=true&characterEncoding=utf8&useSSL=true&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}        # 无默认值，必须设置环境变量
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.jujiu.agent.model
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.jujiu.agent: WARN           # 生产环境只记录警告和错误

jwt:
  secret: ${JWT_SECRET}             # 无默认值，必须设置环境变量

deepseek:
  api-key: ${DEEPSEEK_API_KEY}      # 无默认值，必须设置环境变量
  base-url: https://api.deepseek.com
  model: deepseek-chat
  max-context-messages: 10
  max-messages-per-minute: 10       # 生产环境严格限流
  system-prompt: "你是一个智能助手"
  
weather:
  api:
    key: ${WEATHER_API_KEY:}  # 从环境变量读取，默认为空
